services:
  fastapi:
    build:
      context: ./backend
    restart: always
    environment:
      DATABASE_URL: sqlite:///./blog.db
      SECRET_KEY: super-secret-change-me
    ports:
      - "8000:8000"

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - fastapi
